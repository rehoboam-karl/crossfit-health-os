{% extends "base.html" %}

{% block title %}Set New Password - CrossFit Health OS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Set New Password</h2>
                        <p class="text-muted">Enter your new password below</p>
                    </div>
                    
                    <div id="alert-container"></div>
                    
                    <form id="update-password-form">
                        <input type="hidden" id="access_token" value="">
                        <input type="hidden" id="refresh_token" value="">
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">New Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="8">
                            <div class="form-text">Minimum 8 characters</div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="update-btn">
                            <span class="btn-text">Update Password</span>
                            <span class="btn-spinner d-none">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Updating...
                            </span>
                        </button>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <a href="/login" class="text-decoration-none fw-bold">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const SUPABASE_URL = 'https://mhtkifzwthralkeitsuv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1odGtpZnp3dGhyYWxrZWl0c3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NTA4MDQsImV4cCI6MjA4NjIyNjgwNH0.Bix8cvj-WcE-8mC3nCRXRMYV0gdMpM2eTYwDGr6uZBc';

function parseHash() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const result = {};
    for (const [key, value] of params) {
        result[key] = value;
    }
    return result;
}

$(document).ready(function() {
    const hashParams = parseHash();
    $('#access_token').val(hashParams.access_token || '');
    $('#refresh_token').val(hashParams.refresh_token || '');
    
    if (!hashParams.access_token) {
        $('#alert-container').html(
            '<div class="alert alert-danger">Invalid or expired reset link. Please request a new password reset.</div>'
        );
        $('#update-password-form').find('input, button').prop('disabled', true);
    }
    
    // Password match validation
    $('#confirm_password').on('input', function() {
        const password = $('#password').val();
        const confirm = $(this).val();
        
        $('#password-match').remove();
        
        if (confirm.length > 0) {
            if (password === confirm) {
                $(this).after('<div id="password-match" class="mt-1"><small class="text-success"><i class="fas fa-check-circle me-1"></i> Passwords match</small></div>');
            } else {
                $(this).after('<div id="password-match" class="mt-1"><small class="text-danger"><i class="fas fa-times-circle me-1"></i> Passwords do not match</small></div>');
            }
        }
    });
    
    // Form submission
    $('#update-password-form').on('submit', async function(e) {
        e.preventDefault();
        
        const password = $('#password').val();
        const confirmPassword = $('#confirm_password').val();
        const accessToken = $('#access_token').val();
        
        if (password !== confirmPassword) {
            $('#alert-container').html(
                '<div class="alert alert-danger">Passwords do not match.</div>'
            );
            return;
        }
        
        if (password.length < 8) {
            $('#alert-container').html(
                '<div class="alert alert-danger">Password must be at least 8 characters.</div>'
            );
            return;
        }
        
        const $btn = $('#update-btn');
        $btn.prop('disabled', true);
        $btn.find('.btn-text').addClass('d-none');
        $btn.find('.btn-spinner').removeClass('d-none');
        
        try {
            // Update password via Supabase
            const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                method: 'PUT',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ password })
            });
            
            if (response.ok) {
                $('#alert-container').html(
                    '<div class="alert alert-success">Password updated successfully! Redirecting to login...</div>'
                );
                $('#update-password-form').find('input, button').prop('disabled', true);
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login?password_updated=true';
                }, 2000);
            } else {
                const error = await response.json();
                throw new Error(error.msg || 'Failed to update password');
            }
        } catch (error) {
            console.error('Update password error:', error);
            $('#alert-container').html(
                '<div class="alert alert-danger">' + error.message + '</div>'
            );
            $btn.prop('disabled', false);
            $btn.find('.btn-text').removeClass('d-none');
            $btn.find('.btn-spinner').addClass('d-none');
        }
    });
});
</script>
{% endblock %}
