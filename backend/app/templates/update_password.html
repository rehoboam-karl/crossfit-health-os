{% extends "base.html" %}

{% block title %}Set New Password - CrossFit Health OS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Set New Password</h2>
                        <p class="text-muted">Enter your new password below</p>
                    </div>
                    
                    <div id="alert-container"></div>
                    
                    <form id="update-password-form">
                        <input type="hidden" id="access_token" value="">
                        <input type="hidden" id="refresh_token" value="">
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">New Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="password" name="password" required minlength="8">
                                <button class="btn btn-outline-secondary" type="button" id="toggle-password">
                                    <i class="fas fa-eye" id="toggle-password-icon"></i>
                                </button>
                            </div>
                            <div class="form-text">Minimum 8 characters</div>
                            
                            <!-- Password strength indicator -->
                            <div class="mt-2" id="password-strength-container" style="display: none;">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <small class="text-muted">Password strength:</small>
                                    <small id="strength-text" class="fw-bold">Weak</small>
                                </div>
                                <div class="progress" style="height: 5px;">
                                    <div id="strength-bar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">Confirm New Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" required>
                                <button class="btn btn-outline-secondary" type="button" id="toggle-confirm-password">
                                    <i class="fas fa-eye" id="toggle-confirm-password-icon"></i>
                                </button>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="update-btn">
                            <span class="btn-text">Update Password</span>
                            <span class="btn-spinner d-none">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Updating...
                            </span>
                        </button>
                    </form>
                    
                    <hr>
                    
                    <div class="text-center">
                        <a href="/login" class="text-decoration-none fw-bold">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/validation.js"></script>
<script>
const SUPABASE_URL = '{{ supabase_url }}';
const SUPABASE_ANON_KEY = '{{ supabase_anon_key }}';

function parseHash() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const result = {};
    for (const [key, value] of params) {
        result[key] = value;
    }
    return result;
}

$(document).ready(function() {
    // Setup real-time validation
    FormValidator.setupRealtimeValidation($('#update-password-form'));

    const hashParams = parseHash();
    $('#access_token').val(hashParams.access_token || '');
    $('#refresh_token').val(hashParams.refresh_token || '');

    if (!hashParams.access_token) {
        $('#alert-container').html(
            '<div class="alert alert-danger">Invalid or expired reset link. Please request a new password reset.</div>'
        );
        $('#update-password-form').find('input, button').prop('disabled', true);
    }
    
    // Password visibility toggle
    $('#toggle-password').on('click', function() {
        const passwordInput = $('#password');
        const icon = $('#toggle-password-icon');
        
        if (passwordInput.attr('type') === 'password') {
            passwordInput.attr('type', 'text');
            icon.removeClass('fa-eye').addClass('fa-eye-slash');
        } else {
            passwordInput.attr('type', 'password');
            icon.removeClass('fa-eye-slash').addClass('fa-eye');
        }
    });
    
    $('#toggle-confirm-password').on('click', function() {
        const confirmInput = $('#confirm_password');
        const icon = $('#toggle-confirm-password-icon');
        
        if (confirmInput.attr('type') === 'password') {
            confirmInput.attr('type', 'text');
            icon.removeClass('fa-eye').addClass('fa-eye-slash');
        } else {
            confirmInput.attr('type', 'password');
            icon.removeClass('fa-eye-slash').addClass('fa-eye');
        }
    });
    
    // Password strength indicator
    $('#password').on('input', function() {
        const password = $(this).val();
        
        if (password.length === 0) {
            $('#password-strength-container').hide();
            return;
        }
        
        $('#password-strength-container').show();
        
        const strength = calculatePasswordStrength(password);
        updateStrengthIndicator(strength);
    });
    
    function calculatePasswordStrength(password) {
        let strength = 0;
        
        // Length
        if (password.length >= 8) strength += 25;
        if (password.length >= 12) strength += 25;
        
        // Contains lowercase
        if (/[a-z]/.test(password)) strength += 15;
        
        // Contains uppercase
        if (/[A-Z]/.test(password)) strength += 15;
        
        // Contains numbers
        if (/\d/.test(password)) strength += 10;
        
        // Contains special characters
        if (/[^a-zA-Z0-9]/.test(password)) strength += 10;
        
        return Math.min(strength, 100);
    }
    
    function updateStrengthIndicator(strength) {
        const $bar = $('#strength-bar');
        const $text = $('#strength-text');
        
        $bar.css('width', strength + '%');
        
        if (strength < 40) {
            $bar.removeClass().addClass('progress-bar bg-danger');
            $text.text('Weak').removeClass().addClass('fw-bold text-danger');
        } else if (strength < 70) {
            $bar.removeClass().addClass('progress-bar bg-warning');
            $text.text('Medium').removeClass().addClass('fw-bold text-warning');
        } else {
            $bar.removeClass().addClass('progress-bar bg-success');
            $text.text('Strong').removeClass().addClass('fw-bold text-success');
        }
    }
    
    // Password match validation
    $('#confirm_password').on('input', function() {
        const password = $('#password').val();
        const confirm = $(this).val();
        
        $('#password-match').remove();
        
        if (confirm.length > 0) {
            if (password === confirm) {
                $(this).after('<div id="password-match" class="mt-1"><small class="text-success"><i class="fas fa-check-circle me-1"></i> Passwords match</small></div>');
            } else {
                $(this).after('<div id="password-match" class="mt-1"><small class="text-danger"><i class="fas fa-times-circle me-1"></i> Passwords do not match</small></div>');
            }
        }
    });
    
    // Form submission
    $('#update-password-form').on('submit', async function(e) {
        e.preventDefault();

        // Validate form
        const validation = FormValidator.validateForm($(this));
        if (!validation.valid) {
            $('#alert-container').html(
                '<div class="alert alert-danger">Please fix the errors in the form before submitting.</div>'
            );
            return;
        }

        const password = $('#password').val();
        const confirmPassword = $('#confirm_password').val();
        const accessToken = $('#access_token').val();
        
        const $btn = $('#update-btn');
        $btn.prop('disabled', true);
        $btn.find('.btn-text').addClass('d-none');
        $btn.find('.btn-spinner').removeClass('d-none');
        
        try {
            // Update password via Supabase
            const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                method: 'PUT',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ password })
            });
            
            if (response.ok) {
                $('#alert-container').html(
                    '<div class="alert alert-success">Password updated successfully! Redirecting to login...</div>'
                );
                $('#update-password-form').find('input, button').prop('disabled', true);
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login?password_updated=true';
                }, 2000);
            } else {
                const error = await response.json();
                throw new Error(error.msg || 'Failed to update password');
            }
        } catch (error) {
            console.error('Update password error:', error);
            $('#alert-container').html(
                '<div class="alert alert-danger">' + error.message + '</div>'
            );
            $btn.prop('disabled', false);
            $btn.find('.btn-text').removeClass('d-none');
            $btn.find('.btn-spinner').addClass('d-none');
        }
    });
});
</script>
{% endblock %}
