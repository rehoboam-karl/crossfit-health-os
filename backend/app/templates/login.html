{% extends "base.html" %}

{% block title %}Login - CrossFit Health OS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-dumbbell fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Sign In</h2>
                        <p class="text-muted">Welcome back! Log in to your account</p>
                    </div>
                    
                    <div id="alert-container"></div>
                    
                    <!-- Success banners -->
                    <div id="success-banner-container"></div>
                    
                    <form id="login-form">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label" for="remember">
                                    Remember me
                                </label>
                            </div>
                            <a href="/forgot-password" class="text-decoration-none">Forgot password?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3" id="login-btn">
                            <span class="btn-text">Sign In</span>
                            <span class="btn-spinner d-none">
                                <span class="spinner-border spinner-border-sm me-2"></span>
                                Signing in...
                            </span>
                        </button>
                    </form>
                    
                    <hr>
                    
                    <p class="text-center text-muted mb-0">
                        Don't have an account?
                        <a href="/register" class="text-decoration-none fw-bold">Sign Up</a>
                    </p>
                    
                    <div class="text-center mt-3">
                        <a href="/" class="text-muted text-decoration-none small">
                            <i class="fas fa-arrow-left me-1"></i> Back to home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/auth.js"></script>
<script src="/static/js/validation.js"></script>
<script>
$(document).ready(function() {
    // Setup real-time validation
    FormValidator.setupRealtimeValidation($('#login-form'));

    // Check for success query parameters
    const urlParams = new URLSearchParams(window.location.search);
    
    if (urlParams.get('password_updated') === 'true') {
        showSuccessBanner('Password updated successfully! You can now log in with your new password.');
        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
    } else if (urlParams.get('verified') === 'true') {
        showSuccessBanner('Email verified successfully! You can now log in to your account.');
        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
    }
    
    function showSuccessBanner(message) {
        const banner = `
            <div class="alert alert-success alert-dismissible fade show mb-3" role="alert">
                <i class="fas fa-check-circle me-2"></i>${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        $('#success-banner-container').html(banner);
    }
    
    $('#login-form').on('submit', function(e) {
        e.preventDefault();

        // Validate form
        const validation = FormValidator.validateForm($(this));
        if (!validation.valid) {
            return false;
        }

        const email = $('#email').val();
        const password = $('#password').val();
        const $btn = $('#login-btn');
        
        // Show loading
        $btn.prop('disabled', true);
        $btn.find('.btn-text').addClass('d-none');
        $btn.find('.btn-spinner').removeClass('d-none');
        
        // Call API
        $.ajax({
            url: '/api/v1/auth/login',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ email, password }),
            success: function(response) {
                // Store tokens
                localStorage.setItem('access_token', response.access_token);
                if (response.refresh_token) {
                    localStorage.setItem('refresh_token', response.refresh_token);
                }
                localStorage.setItem('user', JSON.stringify(response.user));
                
                // Redirect to dashboard
                window.location.href = '/dashboard';
            },
            error: function(xhr) {
                let errorMsg = 'Invalid email or password';
                if (xhr.responseJSON && xhr.responseJSON.detail) {
                    errorMsg = xhr.responseJSON.detail;
                }
                
                showAlert(errorMsg, 'danger');
                
                // Reset button
                $btn.prop('disabled', false);
                $btn.find('.btn-text').removeClass('d-none');
                $btn.find('.btn-spinner').addClass('d-none');
            }
        });
    });
    
    function showAlert(message, type) {
        const alert = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
        $('#alert-container').html(alert);
    }
});
</script>
{% endblock %}
