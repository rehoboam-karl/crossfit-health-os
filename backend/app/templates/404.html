{% extends "base.html" %}

{% block title %}404 - {{ t("errors.page_404_title") }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-8 text-center">
            <div class="mb-4">
                <i class="fas fa-ghost fa-7x text-muted"></i>
            </div>
            <h1 class="display-1 fw-bold text-primary">404</h1>
            <h2 class="mb-4">{{ t("errors.page_404_title") }}</h2>
            <p class="lead text-muted mb-5">
                {{ t("errors.page_404_body") }}
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/" class="btn btn-primary btn-lg">
                    <i class="fas fa-home me-2"></i> {{ t("errors.back_home") }}
                </a>
                <a href="/dashboard" class="btn btn-outline-secondary btn-lg">
                    <i class="fas fa-tachometer-alt me-2"></i> {{ t("errors.to_dashboard") }}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
