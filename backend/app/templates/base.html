<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CrossFit Health OS{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block navbar %}{% endblock %}
    
    {% block content %}{% endblock %}
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ApexCharts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    
    <!-- Auth hash handler -->
    <script>
    $(document).ready(function() {
        // Only redirect from root "/" to auth handler, not from /update-password
        if (window.location.pathname === '/' && window.location.hash && window.location.hash.includes('access_token')) {
            window.location.href = '/auth/handler' + window.location.hash;
        }
    });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
