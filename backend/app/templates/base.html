<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CrossFit Health OS{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/main.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="fas fa-dumbbell"></i> CrossFit Health OS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/dashboard">
                        <i class="fas fa-home me-1"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'workouts' %}active{% endif %}" href="/dashboard/workouts">
                        <i class="fas fa-dumbbell me-1"></i> Workouts
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'schedule' %}active{% endif %}" href="/dashboard/schedule">
                        <i class="fas fa-calendar me-1"></i> Schedule
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'reviews' %}active{% endif %}" href="/dashboard/reviews">
                        <i class="fas fa-chart-line me-1"></i> Reviews
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'health' %}active{% endif %}" href="/dashboard/health">
                        <i class="fas fa-heartbeat me-1"></i> Health
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'nutrition' %}active{% endif %}" href="/dashboard/nutrition">
                        <i class="fas fa-utensils me-1"></i> Nutrition
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'profile' %}active{% endif %}" href="/dashboard/profile">
                        <i class="fas fa-user me-1"></i> Profile
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle me-1"></i> <span id="user-name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/dashboard/profile"><i class="fas fa-cog me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="#" id="logout-btn"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}
    
    {% block content %}{% endblock %}
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ApexCharts -->
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    
    <!-- Auth hash handler -->
    <script>
    $(document).ready(function() {
        // Only redirect from root "/" to auth handler, not from /update-password
        if (window.location.pathname === '/' && window.location.hash && window.location.hash.includes('access_token')) {
            window.location.href = '/auth/handler' + window.location.hash;
        }
    });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
