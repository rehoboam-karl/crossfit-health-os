{% extends "base.html" %}

{% block title %}Processing... - CrossFit Health OS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                    <div id="loading">
                        <div class="spinner-border text-primary mb-4" role="status" style="width: 3rem; height: 3rem;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <h3>Processing...</h3>
                        <p class="text-muted">Please wait while we verify your session.</p>
                    </div>
                    
                    <div id="success" class="d-none">
                        <i class="fas fa-check-circle fa-5x text-success mb-4"></i>
                        <h3>Success!</h3>
                        <p class="text-muted" id="success-msg">Redirecting...</p>
                    </div>
                    
                    <div id="error" class="d-none">
                        <i class="fas fa-exclamation-circle fa-5x text-danger mb-4"></i>
                        <h3>Error</h3>
                        <p class="text-muted" id="error-msg">Something went wrong.</p>
                        <a href="/login" class="btn btn-primary btn-lg">Back to Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function parseHash() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const result = {};
    for (const [key, value] of params) {
        result[key] = value;
    }
    return result;
}

async function handleAuth() {
    const hashParams = parseHash();
    const accessToken = hashParams.access_token;
    const refreshToken = hashParams.refresh_token;
    const type = hashParams.type;
    
    console.log('Auth handler - type:', type);
    
    if (!accessToken) {
        window.location.href = '/login';
        return;
    }
    
    try {
        if (type === 'recovery') {
            // Password reset - redirect to update password page with tokens
            const redirectUrl = '/update-password' + window.location.hash;
            window.location.href = redirectUrl;
        } else {
            // Email confirmation - store tokens and go to dashboard
            localStorage.setItem('sb-access-token', accessToken);
            localStorage.setItem('sb-refresh-token', refreshToken);
            
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('success').classList.remove('d-none');
            document.getElementById('success-msg').textContent = 'Email verified! Redirecting to dashboard...';
            
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 2000);
        }
    } catch (err) {
        console.error('Auth error:', err);
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('error').classList.remove('d-none');
        document.getElementById('error-msg').textContent = err.message || 'Authentication failed';
    }
}

handleAuth();
</script>
{% endblock %}
